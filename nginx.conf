server {
    listen 8080;
    server_name rosesolutions.work www.rosesolutions.work;
    root /usr/share/nginx/html;
    index index.html;

    # nginx-generated redirects (e.g. the trailing-slash redirect if a
    # directory is ever added) must stay relative: clients reach this origin
    # only through the Cloudflare tunnel on 443, so an absolute
    # http://host:8080/ Location would be unreachable.
    absolute_redirect off;

    #Compression
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 64;

    # ── Hide Nginx version from error pages and headers ──────────────
    server_tokens off;

    # ── Security headers ──────────────────────────────────────────────
    # A header CSP is stronger than the <meta> fallback in index.html, and
    # frame-ancestors (clickjacking protection) ONLY works as a header —
    # browsers ignore it inside a <meta> CSP. `always` = also on 404/405.
    # The value MUST stay on ONE physical line: a newline inside the quoted
    # string is emitted verbatim as an illegal bare-LF header fold.
    # worker-src lets the page register sw.js (child-src 'self' is the same
    # permission for pre-2022 WebKit's fallback chain); connect-src 'self'
    # is for the worker itself — this header also lands on the sw.js
    # response and governs the fetch() calls inside it.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'sha256-e+ygniN5OKehzFNE3SZ8ES9lG1f3Jtx3c0+TlOvlYv8='; style-src 'sha256-BiF4P2vNY+DWUmFYjdf0KtSqfNr9NDRrGXIwFdAtShw='; img-src 'self'; worker-src 'self'; child-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Caching: filenames are NOT content-hashed, so nothing may be cached
    # as immutable. no-cache = always revalidate: online visitors (and the
    # network-first sw.js) always get a freshly deployed copy, with unchanged
    # files answered by cheap 304s. Offline availability is sw.js's job
    # (Cache Storage), NOT the HTTP cache's — do not add max-age for that.
    add_header Cache-Control "no-cache" always;

    # ── Only allow GET and HEAD — no POST, PUT, DELETE etc ───────────
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── Clean URLs ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # (No immutable static-asset block: everything served is revalidated via
    # no-cache — and a location-level add_header would silently DROP every
    # inherited security header above.)

    # ── Block access to hidden files (.git, .env etc) ─────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block common exploit probes ───────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
        deny all;
        return 404;
    }

    # ── Custom 404 ────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
