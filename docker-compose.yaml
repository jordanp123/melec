x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "3"

services:
  website:
    build: .
    container_name: melec
    read_only: true
    user: 8001:8001
    restart: unless-stopped
    logging: *default-logging
    security_opt:  # incompatible with the Ubuntu SNAP docker package — fix by installing docker.io/docker-ce, never by removing this line
      - no-new-privileges=true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
          pids: 512
    # tmpfs pages count against the 256M memory limit above, so the size=
    # caps must sum to well under it. nginx-unprivileged writes its pid and
    # temp files under /tmp; /var/cache/nginx is unused by this image and
    # kept only as a tiny fallback.
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64M
      - /run:rw,noexec,nosuid,nodev,size=16M
      - /var/cache/nginx/:rw,noexec,nosuid,nodev,size=16M
    networks:
      backend:
  cloudflare_tunnel:
    user: 8000:8000
    container_name: cloudflared-tunnel-melec
    image: cloudflare/cloudflared
    read_only: true
    cpu_shares: 768
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
          pids: 256
    cap_drop:
      - ALL
    security_opt:
        - no-new-privileges=true
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate --metrics 127.0.0.1:20241 run
    # ${TUNNEL_TOKEN} is read from ./.env by compose interpolation; listing it
    # here explicitly (instead of env_file) keeps every OTHER variable that
    # may ever land in .env out of this internet-facing container.
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      backend:
      frontend:
networks:
  backend:
    internal: true
  frontend:
